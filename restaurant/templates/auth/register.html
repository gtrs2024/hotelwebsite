{% extends "base.html" %}
{% block title %}Create Account | Elara Fine Dining{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-bg" style="background-image:url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1600&q=80')"></div>
  <div class="auth-overlay"></div>

  <div class="auth-card reveal">
    <div class="auth-card-header">
      <a href="{{ url_for('index') }}" class="nav-logo" style="display:block;text-align:center;margin-bottom:8px;font-size:1.7rem;"><span>E</span>lara</a>
      <p class="auth-subtitle">Create your member account</p>
    </div>

    {% if errors %}
    <ul class="form-errors">
      {% for e in errors %}<li>{{ e }}</li>{% endfor %}
    </ul>
    {% endif %}

    <form method="POST" action="{{ url_for('customer_register') }}" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="auth-form-grid">
        <div class="form-group full">
          <label>Full Name *</label>
          <input type="text" name="name" value="{{ form.get('name','') }}" placeholder="Your full name" required autofocus>
        </div>
        <div class="form-group full">
          <label>Email Address *</label>
          <input type="email" name="email" value="{{ form.get('email','') }}" placeholder="your@email.com" required>
        </div>
        <div class="form-group full">
          <label>Phone Number</label>
          <input type="tel" name="phone" value="{{ form.get('phone','') }}" placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label>Password *</label>
          <input type="password" name="password" placeholder="Minimum 6 characters" required>
        </div>
        <div class="form-group">
          <label>Confirm Password *</label>
          <input type="password" name="confirm_password" placeholder="Repeat password" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:24px;text-align:center;">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('customer_login') }}">Sign in</a></p>
  </div>
</div>

{% endblock %}
